<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | NamMC SMP</title>
    <link rel="icon" type="image/png" href="https://images2.imgbox.com/6e/43/AM9bEJVa_o.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="api.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 40px 20px;
        }
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(0, 20, 40, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            padding: 40px;
            border: 1px solid #00aaff;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.2);
        }
        h1 { font-family: 'Orbitron', monospace; color: #00aaff; margin-bottom: 20px; }
        .login-box { max-width: 400px; margin: 100px auto; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #00aaff; border-radius: 30px; color: white; }
        .login-box button { background: #00aaff; padding: 12px 30px; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; }
        .player-list { max-height: 500px; overflow-y: auto; margin: 20px 0; }
        .player-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #00aaff; }
        .player-item button { background: #00aaff; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; margin-left: 8px; }
        .rank-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .rank-table th, .rank-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(0,150,255,0.3); }
        .rank-table th { color: #00aaff; }
        button { background: #0066aa; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin: 5px; }
        button:hover { background: #00aaff; }
        .admin-panel { display: none; }
        .hidden-pwd { display: none; }
    </style>
</head>
<body>
<div class="admin-container">
    <div id="loginArea" class="login-box">
        <h1><i class="fas fa-lock"></i> Admin Login</h1>
        <input type="password" id="adminPassword" placeholder="Nhập mật khẩu">
        <button id="loginBtn"><i class="fas fa-sign-in-alt"></i> Đăng nhập</button>
        <p style="margin-top: 15px; font-size: 0.8rem; opacity: 0.6;">🔐 Nhập mật khẩu để tiếp tục</p>
    </div>

    <div id="adminPanel" class="admin-panel">
        <h1><i class="fas fa-user-shield"></i> NamMC Admin Panel</h1>
        <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 30px;">
            <button id="refreshDataBtn"><i class="fas fa-sync-alt"></i> Đồng bộ dữ liệu</button>
            <button id="addPlayerBtn"><i class="fas fa-user-plus"></i> Thêm người chơi</button>
            <button id="backupBtn"><i class="fas fa-download"></i> Backup dữ liệu</button>
        </div>

        <h3><i class="fas fa-trophy"></i> Bảng xếp hạng (Rank)</h3>
        <table class="rank-table" id="rankTableAdmin">
            <thead><tr><th>#</th><th>Người chơi</th><th>Kill</th><th>Rank</th><th>Thao tác</th></tr></thead>
            <tbody id="rankBodyAdmin"></tbody>
        </table>

        <h3><i class="fas fa-users"></i> Quản lý người chơi</h3>
        <div class="player-list" id="playerListAdmin"></div>

        <p style="margin-top: 20px; font-size: 0.8rem;">📌 Thay đổi sẽ được ghi nhận và đồng bộ qua API.</p>
    </div>
</div>

<script>
    // MẬT KHẨU ĐƯỢC LƯU TRONG CODE (ẨN, KHÔNG HIỆN TRÊN WEB)
    const ADMIN_PASSWORD = "Namdb123";
    
    const loginArea = document.getElementById('loginArea');
    const adminPanel = document.getElementById('adminPanel');
    const loginBtn = document.getElementById('loginBtn');
    const pwdInput = document.getElementById('adminPassword');

    loginBtn.onclick = () => {
        if (pwdInput.value === ADMIN_PASSWORD) {
            loginArea.style.display = 'none';
            adminPanel.style.display = 'block';
            loadAdminData();
        } else {
            alert('Sai mật khẩu!');
            pwdInput.value = '';
        }
    };

    // Cho phép nhấn Enter để đăng nhập
    pwdInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loginBtn.click();
    });

    async function loadAdminData() {
        const players = typeof window.getPlayerRanking === 'function' ? await window.getPlayerRanking() : (window.mockPlayers || []);
        const rankBody = document.getElementById('rankBodyAdmin');
        const playerList = document.getElementById('playerListAdmin');
        
        if (!players.length) {
            rankBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Chưa có dữ liệu</td></tr>';
            playerList.innerHTML = '<p>Chưa có người chơi</p>';
            return;
        }
        
        rankBody.innerHTML = players.map((p, idx) => `
            <tr><td>${idx+1}</td><td>${p.name}</td><td>${p.kills}</td><td>${p.rank}</td>
            <td><button class="editRankBtn" data-name="${p.name}">Sửa rank</button> <button class="rewardBtn" data-name="${p.name}">Thưởng</button></td>
        `).join('');
        
        playerList.innerHTML = players.map(p => `
            <div class="player-item" data-name="${p.name}">
                <span><strong>${p.name}</strong> - Kill: ${p.kills} - Rank: ${p.rank}</span>
                <div><button class="editRankBtnItem" data-name="${p.name}">✏️ Sửa rank</button><button class="rewardBtnItem" data-name="${p.name}">💰 Thưởng</button><button class="deleteBtn" data-name="${p.name}">🗑️ Xóa</button></div>
            </div>
        `).join('');

        document.querySelectorAll('.editRankBtn, .editRankBtnItem').forEach(btn => {
            btn.onclick = () => {
                const name = btn.getAttribute('data-name');
                const newRank = prompt(`Nhập rank mới cho ${name}:`, 'CHIẾN BINH');
                if (newRank && typeof window.updatePlayerRank === 'function') window.updatePlayerRank(name, newRank);
                else if (newRank) alert(`Demo: Đã sửa rank ${name} thành ${newRank}`);
                loadAdminData();
            };
        });
        
        document.querySelectorAll('.rewardBtn, .rewardBtnItem').forEach(btn => {
            btn.onclick = () => {
                const name = btn.getAttribute('data-name');
                const amount = prompt(`Nhập số tiền thưởng cho ${name}:`, '1000');
                if (amount && typeof window.rewardPlayer === 'function') window.rewardPlayer(name, amount);
                else if (amount) alert(`Demo: Đã thưởng ${amount} VND cho ${name}`);
            };
        });
        
        document.querySelectorAll('.deleteBtn').forEach(btn => {
            btn.onclick = () => {
                if (confirm('Xóa người chơi này?')) alert(`Demo: Đã xóa ${btn.getAttribute('data-name')}`);
            };
        });
    }

    document.getElementById('refreshDataBtn')?.addEventListener('click', () => { alert('🔄 Đồng bộ dữ liệu từ server!'); loadAdminData(); });
    document.getElementById('addPlayerBtn')?.addEventListener('click', () => { alert('📝 Demo: Thêm người chơi mới (tính năng đang phát triển)'); });
    document.getElementById('backupBtn')?.addEventListener('click', () => { alert('📦 Demo: Backup dữ liệu (tính năng đang phát triển)'); });
</script>
</body>
</html>
